<!doctype html>
<html data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'none';
      script-src 'self' https://esm.sh https://cdn.jsdelivr.net https://code.jquery.com;
      style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
      img-src * data: blob:;
      connect-src https://api.syncad.com https://api.deathwing.me https://api.hive.blog https://esm.sh;
      font-src 'self';
      frame-src https://www.youtube.com https://www.youtube-nocookie.com https://3speak.tv https://odysee.com https://rumble.com;
    "
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="thirdparty/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="theme.js"></script>
    <script
      src="https://code.jquery.com/jquery-3.6.0.min.js"
      integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
      integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/hive-tx@5.6.0-beta.1/dist/hive-tx.min.js"
      integrity="sha384-sK7c3vlAGPdEXkxJPtXku2++tadZEGH1bFPve59a01+BkbT+qETDVDR4t+qpjjV0"
      crossorigin="anonymous"
    ></script>
    <title>Random Hive</title>
    <meta
      name="description"
      content="Discover a random recently-published post from the Hive blockchain. A fun way to explore Hive content."
    />
    <link rel="canonical" href="https://hiveuprss.github.io/randomhive/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hiveuprss.github.io/randomhive/" />
    <meta property="og:title" content="Random Hive" />
    <meta
      property="og:description"
      content="Discover a random recently-published post from the Hive blockchain. A fun way to explore Hive content."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Random Hive" />
    <meta
      name="twitter:description"
      content="Discover a random recently-published post from the Hive blockchain. A fun way to explore Hive content."
    />
  </head>
  <body>
    <!-- Header -->
    <header class="app-header">
      <a class="app-logo" href="#">
        <img src="assets/hive-32.png" alt="Hive" />
        Random Hive
      </a>
      <span class="header-tagline"
        >Discover random posts from the Hive blockchain</span
      >
      <div class="header-spacer"></div>
      <div class="header-right">
        <div id="signin-container">
          <form id="signin">
            <div class="input-group">
              <span class="input-group-text">@</span>
              <input
                type="text"
                class="form-control"
                placeholder="Username"
                aria-label="Username"
              />
              <button class="btn btn-primary" type="submit" title="Sign in">
                <i class="fas fa-sign-in-alt"></i>
              </button>
            </div>
          </form>
        </div>
        <div id="signout-container" style="display: none">
          <button class="btn-ghost" id="signout" title="Sign out">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
        <button class="btn-ghost" id="theme-toggle" title="Toggle dark mode">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="main-wrap">
      <div class="row g-4">
        <div class="col-lg-9" id="hr-content"></div>
        <div class="col-lg-3" id="hr-content-md"></div>
      </div>
    </div>

    <!-- Action bar -->
    <nav class="action-bar">
      <a
        class="btn-icon"
        id="peakd"
        href=""
        title="View on PeakD"
        target="_blank"
      >
        <img src="assets/peakd-16.png" alt="PeakD" />
      </a>
      <a
        class="btn-icon"
        id="hiveblog"
        href=""
        title="View on Hive.blog"
        target="_blank"
      >
        <img src="assets/hive-16.png" alt="Hive.blog" />
      </a>
      <div class="sep"></div>
      <button class="btn-icon" id="upvote" title="Upvote">
        <i class="fa fa-heart"></i>
      </button>
      <div id="vote-weight-container">
        <input
          type="range"
          id="vote-weight-slider"
          min="1"
          max="100"
          step="1"
          value="100"
          list="vote-weight-ticks"
        />
        <datalist id="vote-weight-ticks">
          <option value="25"></option>
          <option value="50"></option>
          <option value="75"></option>
          <option value="100"></option>
        </datalist>
        <span id="vote-weight-label">100%</span>
      </div>
      <button class="btn-icon" id="follow" title="Follow">
        <i class="fa fa-users"></i>
      </button>
      <button class="btn-icon" id="reblog" title="Reblog">
        <i class="fa fa-share"></i>
      </button>
      <div class="sep"></div>
      <button class="btn-icon btn-next-up next" id="next-up" title="Liked it – next post">
        <i class="fa fa-thumbs-up"></i><i class="fa fa-chevron-right"></i>
      </button>
      <button class="btn-icon btn-next next" id="next-down" title="Not for me – next post">
        <i class="fa fa-thumbs-down"></i><i class="fa fa-chevron-right"></i>
      </button>
      <span class="branding"
        >Brought to you by
        <a href="https://peakd.com/@hivetrending">@HiveTrending</a></span
      >
    </nav>

    <!-- Vote weight popup (mobile) -->
    <div id="vote-popup" aria-hidden="true">
      <div id="vote-popup-inner">
        <div class="vote-popup-header">
          <span>Vote weight</span>
          <button id="vote-popup-close" aria-label="Close">&#x2715;</button>
        </div>
        <div class="vote-popup-slider-row">
          <input
            type="range"
            id="vote-popup-slider"
            min="1"
            max="100"
            step="1"
            value="100"
            list="vote-popup-ticks"
          />
          <datalist id="vote-popup-ticks">
            <option value="25"></option>
            <option value="50"></option>
            <option value="75"></option>
            <option value="100"></option>
          </datalist>
          <span id="vote-popup-label">100%</span>
        </div>
        <button id="vote-popup-confirm">Upvote</button>
      </div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
